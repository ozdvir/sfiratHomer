<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ספירת העומר - אביב רענן</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            /* שימוש בתמונת דשא רענן ושמש בקישור ישיר */
            background: url('https://unsplash.com') no-repeat center center fixed; 
            background-size: cover;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        
        /* שכבת טשטוש עדינה על כל הרקע כדי להבליט את הכרטיס */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(3px);
            z-index: 1;
        }

        .card { 
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(15px);
            padding: 40px; 
            border-radius: 40px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); 
            text-align: center; 
            width: 400px; 
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: fadeIn 1s ease-in-out;
        }

        .hebrew-date { font-size: 1.8em; color: #2d5a27; font-weight: bold; margin-bottom: 5px; }
        .gregorian-date { color: #666; font-size: 0.9em; margin-bottom: 25px; letter-spacing: 1px; }

        .omer-box { 
            background: linear-gradient(135deg, #74b816, #5c940d); /* ירוק אביבי רענן */
            color: white;
            border-radius: 25px; 
            padding: 30px; 
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(92, 148, 13, 0.3);
        }

        .omer-label { font-size: 1.1em; opacity: 0.9; display: block; margin-bottom: 8px; }
        .omer-count { font-size: 4.8em; font-weight: 900; line-height: 0.9; display: block; }
        .omer-text { font-size: 1.4em; font-weight: bold; display: block; margin-top: 10px; }

        .weeks-detail { 
            font-size: 1.25em; 
            color: #2d5a27; 
            font-weight: 600;
            padding-top: 10px;
            border-top: 1px dashed rgba(0,0,0,0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="card">
    <div id="hebrew-date" class="hebrew-date">טוען תאריך...</div>
    <div id="gregorian-date" class="gregorian-date"></div>
    
    <div class="omer-box">
        <span class="omer-label">היום בספירת העומר</span>
        <span id="omer-num" class="omer-count">--</span>
        <span id="omer-text" class="omer-text">ימים לעומר</span>
    </div>

    <div id="omer-details" class="weeks-detail"></div>
</div>

<script>
    // פונקציית גימטריה משופרת
    function getGematria(num) {
        const letters = ["", "א'", "ב'", "ג'", "ד'", "ה'", "ו'", "ז'", "ח'", "ט'", "י'", "י\"א", "י\"ב", "י\"ג", "י\"ד", "ט\"ו", "ט\"ז", "י\"ז", "י\"ח", "י\"ט", "כ'", "כ\"א", "כ\"ב", "כ\"ג", "כ\"ד", "כ\"ה", "כ\"ו", "כ\"ז", "כ\"ח", "כ\"ט", "ל'"];
        return letters[num] || num;
    }

    function updateOmerPage() {
        const now = new Date();
        
        // הגדרת תאריך עברי להיום (6 באפריל 2026 - י"ט בניסן)
        const dayInMonth = 19; 
        const monthName = "ניסן";
        const yearHebrew = "תשפ\"ו";
        
        document.getElementById('hebrew-date').innerText = `${getGematria(dayInMonth)} ב${monthName} ${yearHebrew}`;
        document.getElementById('gregorian-date').innerText = now.toLocaleDateString('he-IL');

        // חישוב ימי העומר (תחילת ספירה: 2 באפריל בערב)
        const startOmer = new Date("2026-04-02T19:00:00");
        const diffInMs = now - startOmer;
        const currentDay = Math.ceil(diffInMs / (1000 * 60 * 60 * 24));

        if (currentDay > 0 && currentDay <= 49) {
            document.getElementById('omer-num').innerText = currentDay;
            
            const weeks = Math.floor(currentDay / 7);
            const days = currentDay % 7;
            
            let detail = "";
            if (weeks > 0) {
                const weekText = weeks === 1 ? "שבוע אחד" : `${getGematria(weeks).replace("'", "")} שבועות`;
                detail = `שהם ${weekText}`;
                if (days > 0) {
                    const dayText = days === 1 ? "יום אחד" : `${getGematria(days)} ימים`;
                    detail += ` ו-${dayText}`;
                }
            } else {
                detail = "שבוע ראשון לספירה";
            }
            document.getElementById('omer-details').innerText = detail;
        } else {
            document.getElementById('omer-num').innerText = "0";
            document.getElementById('omer-text').innerText = "מחוץ לימי הספירה";
        }
    }

    updateOmerPage();
</script>

</body>
</html>
