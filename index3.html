<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ספירת העומר - אביב רענן</title>

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: url('https://magazine.isees.org.il/wp-content/uploads/2023/07/EE-summer23-agricultural-drought-4-rotated-e1688983335106.jpg')
            no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(3px);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 1920px;
            height: 1080px;
            max-width: 100%;
            max-height: 100%;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;

            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            gap: 15px;
        }

        /* כרטיס ספירת העומר */
        .omer-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            padding: 15px;
            border-radius: 20px;
            width: 750px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transform: scale(0.85);
        }

        .hebrew-date { font-size: 1.8em; color: #2d5a27; font-weight: bold; }
        .gregorian-date { font-size: 1em; color: #444; margin-bottom: 10px; }
        .omer-count { font-size: 3.2em; font-weight: 900; color: #2d5a27; }
        .weeks-detail { font-size: 1.2em; color: #2d5a27; }

        /* כותרת */
        .video-title {
            font-size: 1.8em;
            font-weight: 900;
            color: #2d5a27;
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        /* וידאו ברוחב זהה לכרטיס */
        .youtube-wrapper {
            position: relative;
            width: 950px;
            height: 620px; /* יחס 16:9 מוקטן */
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        }

        .youtube-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

    <!-- כרטיס ספירת העומר -->
    <div class="omer-card">
        <div id="hebrew-date" class="hebrew-date">ספירת העומר</div>
        <div id="gregorian-date" class="gregorian-date"></div>
        <div id="omer-num" class="omer-count">--</div>
        <div id="omer-details" class="weeks-detail"></div>
    </div>

    <!-- כותרת -->
    <div class="video-title">כוחו של יהודי בספירת העומר</div>

    <!-- וידאו ברוחב זהה -->
    <div class="youtube-wrapper">
    <iframe
        src="https://www.youtube.com/embed/V6X6vsdaltE?autoplay=1&mute=1&loop=1&playlist=V6X6vsdaltE&controls=0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
    </iframe>
    </div>

</div>

<script>
    function getGematria(num) {
        const letters = ["", "א'", "ב'", "ג'", "ד'", "ה'", "ו'", "ז'", "ח'", "ט'", "י'", "י\"א", "י\"ב", "י\"ג", "י\"ד", "ט\"ו", "ט\"ז", "י\"ז", "י\"ח", "י\"ט", "כ'", "כ\"א", "כ\"ב", "כ\"ג", "כ\"ד", "כ\"ה", "כ\"ו", "כ\"ז", "כ\"ח", "כ\"ט", "ל'"];
        return letters[num] || num;
    }

    async function updateOmerFromApi() {
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        const todayStr = `${yyyy}-${mm}-${dd}`;

        const url = `https://www.hebcal.com/hebcal?v=1&cfg=json&start=${todayStr}&end=${todayStr}&o=on&i=on&hebdate=on`;

        try {
            const res = await fetch(url);
            const data = await res.json();

            document.getElementById('gregorian-date').innerText =
                now.toLocaleDateString('he-IL');

            if (data.hebrew) {
                document.getElementById('hebrew-date').innerText = data.hebrew;
            }

            const omerItem = data.items && data.items.find(e =>
                e.category === 'omer' ||
                (e.title && e.title.toLowerCase().includes('omer'))
            );

            if (!omerItem) return;

            const match = omerItem.title.match(/(\d+)[a-z]{2}\s+day/i);
            let dayNum = match ? parseInt(match[1], 10) : null;

            if (!dayNum) return;

            if (now.getHours() >= 19) {
                dayNum += 1;
            }

            document.getElementById('omer-num').innerText = dayNum;

            const weeks = Math.floor(dayNum / 7);
            const days = dayNum % 7;

            let detail = '';
            if (weeks > 0) {
                const weekText = weeks === 1
                    ? 'שבוע אחד'
                    : `${getGematria(weeks).replace("'", "")} שבועות`;
                detail = `שהם ${weekText}`;
                if (days > 0) {
                    const dayText = days === 1
                        ? 'יום אחד'
                        : `${getGematria(days)} ימים`;
                    detail += ` ו-${dayText}`;
                }
            } else {
                detail = 'שבוע ראשון לספירה';
            }

            document.getElementById('omer-details').innerText = detail;

        } catch (err) {
            console.error('שגיאה בשליפת נתוני ספירת העומר:', err);
        }
    }

    updateOmerFromApi();

    setInterval(() => {
    location.reload();
}, 3600000); // 1 שעה = 3,600,000 מילישניות

</script>

</body>
</html>
