<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ספירת העומר - אביב רענן</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: url('https://magazine.isees.org.il/wp-content/uploads/2023/07/EE-summer23-agricultural-drought-4-rotated-e1688983335106.jpg')
            no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(3px);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        /* כרטיס ספירת העומר בראש הדף */
        .omer-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: fadeIn 1s ease-in-out;
        }

        .hebrew-date { font-size: 1.8em; color: #2d5a27; font-weight: bold; }
        .gregorian-date { color: #666; font-size: 1em; margin-bottom: 20px; }

        .omer-count {
            font-size: 4em;
            font-weight: 900;
            color: #2d5a27;
        }

        .weeks-detail {
            font-size: 1.3em;
            color: #2d5a27;
            margin-top: 10px;
            font-weight: 600;
        }

        /* חלון יוטיוב גדול במרכז */
        .youtube-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
            animation: fadeIn 1.2s ease-in-out;
        }

        .youtube-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

    <!-- כרטיס ספירת העומר בראש הדף -->
    <div class="omer-card">
        <div id="hebrew-date" class="hebrew-date">טוען תאריך...</div>
        <div id="gregorian-date" class="gregorian-date"></div>

        <div id="omer-num" class="omer-count">--</div>
        <div id="omer-details" class="weeks-detail"></div>
    </div>

    <!-- חלון יוטיוב גדול במרכז -->
    <div class="youtube-wrapper">
        <iframe
            src="https://www.youtube.com/embed/V6X6vsdaltE?autoplay=1&mute=1&loop=1&playlist=V6X6vsdaltE&controls=0"
            title="YouTube video"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
        </iframe>
    </div>
