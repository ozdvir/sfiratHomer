<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ספירת העומר - Digital Signage</title>

    <style>
        :root {
            --primary-green: #1b4332;
            --accent-gold: #d4af37;
            --glass-bg: rgba(255, 255, 255, 0.85);
        }

        * { box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('https://magazine.isees.org.il/wp-content/uploads/2023/07/EE-summer23-agricultural-drought-4-rotated-e1688983335106.jpg') 
                        no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.3), rgba(0,0,0,0.1));
            backdrop-filter: blur(5px);
            z-index: 1;
        }

        .main-layout {
            position: relative;
            z-index: 2;
            width: 90vw;
            height: 90vh;
            display: grid;
            grid-template-columns: 1fr 1.2fr; /* Split screen layout */
            gap: 40px;
            align-items: center;
        }

        /* Right Side: Information Card */
        .info-side {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .omer-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.3);
            text-align: center;
        }

        .hebrew-date { font-size: 2.5rem; color: var(--primary-green); font-weight: 800; margin-bottom: 5px; }
        .gregorian-date { font-size: 1.4rem; color: #555; margin-bottom: 25px; }
        
        .omer-count-wrapper {
            margin: 20px 0;
        }

        .omer-num { 
            font-size: 8rem; 
            font-weight: 900; 
            color: var(--primary-green);
            line-height: 1;
            text-shadow: 2px 2px 0px #fff;
            animation: pulse 2s infinite ease-in-out;
        }

        .omer-label { font-size: 2rem; color: var(--primary-green); font-weight: 600; }
        .weeks-detail { 
            font-size: 1.8rem; 
            color: #333; 
            margin-top: 20px; 
            padding-top: 20px;
            border-top: 2px solid rgba(0,0,0,0.05);
        }

        /* Left Side: Video Content */
        .video-side {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            border: 4px solid white;
        }

        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        .video-caption {
            font-size: 2.2rem;
            color: white;
            text-align: center;
            font-weight: 900;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        /* Responsive adjustments for vertical screens */
        @media (max-aspect-ratio: 1/1) {
            .main-layout {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }
            .omer-num { font-size: 5rem; }
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="main-layout">
    
    <div class="video-side">
        <div class="video-caption">כוחו של יהודי בספירת העומר</div>
        <div class="video-container">
            <iframe 
                src="https://www.youtube.com/embed/V6X6vsdaltE?autoplay=1&mute=1&loop=1&playlist=V6X6vsdaltE&controls=0&modestbranding=1" 
                allow="autoplay; encrypted-media" 
                allowfullscreen>
            </iframe>
        </div>
    </div>

    <div class="info-side">
        <div class="omer-card">
            <div id="hebrew-date" class="hebrew-date">טוען נתונים...</div>
            <div id="gregorian-date" class="gregorian-date"></div>
            
            <div class="omer-count-wrapper">
                <div class="omer-label">היום</div>
                <div id="omer-num" class="omer-num">--</div>
                <div class="omer-label">יום לעומר</div>
            </div>

            <div id="omer-details" class="weeks-detail"></div>
        </div>
    </div>

</div>

<script>
    async function updateOmer() {
        const now = new Date();
        const todayStr = now.toISOString().split('T')[0];
        const url = `https://www.hebcal.com/hebcal?v=1&cfg=json&start=${todayStr}&end=${todayStr}&o=on&i=on&hebdate=on`;

        try {
            const res = await fetch(url);
            const data = await res.json();

            document.getElementById('gregorian-date').innerText = now.toLocaleDateString('he-IL');
            if (data.hebrew) document.getElementById('hebrew-date').innerText = data.hebrew;

            const omerItem = data.items && data.items.find(e => e.category === 'omer');

            if (!omerItem) {
                document.getElementById('omer-num').innerText = "פסח";
                document.getElementById('omer-details').innerText = "מועדים לשמחה";
                return;
            }

            const match = omerItem.title.match(/(\d+)/);
            let dayNum = match ? parseInt(match[0], 10) : 0;

            // Evening logic: If after 19:30, show the next day
            if (now.getHours() >= 19 && now.getMinutes() >= 30) {
                dayNum += 1;
            }

            document.getElementById('omer-num').innerText = dayNum;

            // Proper Hebrew Grammar
            const weeks = Math.floor(dayNum / 7);
            const days = dayNum % 7;

            const weekNames = ["", "שבוע אחד", "שבועיים", "שלושה שבועות", "ארבעה שבועות", "חמישה שבועות", "שישה שבועות", "שבעה שבועות"];
            const dayNames = ["", "יום אחד", "שני ימים", "שלושה ימים", "ארבעה ימים", "חמישה ימים", "שישה ימים"];

            let detail = "";
            if (weeks > 0) {
                detail = `שהם ${weekNames[weeks]}`;
                if (days > 0) {
                    detail += ` ו-${dayNames[days]}`;
                }
            } else {
                detail = "בשבוע הראשון לספירה";
            }

            document.getElementById('omer-details').innerText = detail;

        } catch (err) {
            console.error('API Error:', err);
        }
    }

    updateOmer();
    // Refresh every 30 minutes to catch the evening transition
    setInterval(updateOmer, 1800000); 
</script>

</body>
</html>
