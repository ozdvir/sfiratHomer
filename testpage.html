<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>שבת בבית הכנסת</title>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh; font-family: "Heebo", Arial, sans-serif; background-image: url("https://raw.githubusercontent.com/ozdvir/sfiratHomer/main/%D7%A9%D7%91%D7%AA%20%D7%A9%D7%9C%D7%95%D7%9D.webp"); background-size: cover; background-position: center; color: #ffffff; text-shadow: 0 0 12px black; position: relative; }
    #top-info { position: absolute; top: 20px; right: 40px; text-align: right; }
    #clock { font-size: 48px; font-weight: 600; }
    #hebrew-date { font-size: 32px; margin-top: 5px; font-weight: 500; color: #ffd86b; }
    #omer { font-size: 32px; margin-top: 5px; font-weight: 500; color: #00ffe5; }

    /* כותרת ממורכזת */
    h1 {
      position: absolute;
      top: 150px;
      width: 100%;
      text-align: center;
      font-size: 80px;
      font-weight: 800;
      margin: 0;
    }

    .times {
      position: absolute;
      top: 300px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 38px;
      line-height: 1.7;
      font-weight: 300;
      text-align: center;
    }
    .label { font-weight: 600; color: #ffd86b; }
  </style>
</head>

<body>
  <div id="top-info">
    <div id="clock">00:00:00</div>
    <div id="hebrew-date">טוען תאריך...</div>
    <div id="omer"></div>
  </div>

  <h1 id="parasha-title">טוען פרשה...</h1>

  <div class="times">
    <div><span class="label">כניסת שבת:</span> <span id="time-candles">--:--</span></div>
    <div><span class="label">שחרית:</span> 9:00</div>
    <div><span class="label">מנחה:</span> 18:50</div>
    <div><span class="label">יציאת שבת:</span> <span id="time-havdalah">--:--</span></div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      document.getElementById("clock").textContent = now.toLocaleTimeString('he-IL', {hour12: false});
    }
    setInterval(updateClock, 1000);
    updateClock();

    async function updateData() {
      // 1. טעינת פרשה וזמנים
      try {
        const response = await fetch("https://www.hebcal.com/shabbat?cfg=json&city=IL-Jerusalem");
        const data = await response.json();
        
        const parasha = data.items.find(item => item.category === "parashat");
        if (parasha) document.getElementById("parasha-title").textContent = parasha.hebrew;

        const candles = data.items.find(item => item.category === "candles");
        const havdalah = data.items.find(item => item.category === "havdalah");

        if (candles) document.getElementById("time-candles").textContent = new Date(candles.date).toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'});
        if (havdalah) document.getElementById("time-havdalah").textContent = new Date(havdalah.date).toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'});
      } catch (e) { console.error("שגיאה ב-API"); }

      // 2. טעינת תאריך עברי
      const now = new Date();
      const hebrewDateStr = now.toLocaleDateString("he-IL-u-ca-hebrew", {day: "numeric", month: "long", year: "numeric"});
      document.getElementById("hebrew-date").textContent = hebrewDateStr;

      // 3. ספירת העומר (בסיסי)
      const options = { calendar: "hebrew", day: "numeric", month: "numeric" };
      const dateParts = new Intl.DateTimeFormat("he-IL-u-ca-hebrew", options).formatToParts(now);
      const day = parseInt(dateParts.find(p => p.type === "day").value);
      const month = parseInt(dateParts.find(p => p.type === "month").value);
      
      let omerDay = 0;
      if (month === 1) omerDay = day - 15; // ניסן
      else if (month === 2) omerDay = 15 + day; // אייר
      else if (month === 3) omerDay = 44 + day; // סיון
      
      if (omerDay > 0 && omerDay <= 49) {
        document.getElementById("omer").textContent = `היום ${omerDay} לעומר`;
      }
    }

    updateData();
  </script>
</body>
</html>
