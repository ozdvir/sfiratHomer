<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>שבת בבית הכנסת</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Heebo", Arial, sans-serif;
        background-image: url("background.jpg");
        background-size: cover;
        background-position: center;
        height: 100vh;
        color: white;
        text-shadow: 0 0 12px black;
        }

    .overlay {
        background: rgba(0,0,0,0.55);
        width: 100%;
        height: 100%;
        padding: 40px;
        box-sizing: border-box;
    }

    h1 {
        font-size: 70px;
        margin-bottom: 40px;
        font-weight: 700;
    }

    .times {
        font-size: 48px;
        line-height: 1.8;
    }
</style>
</head>

<body>
<div class="overlay">
    <h1 id="parasha">טוען פרשת השבוע...</h1>

    <div class="times">
        <div id="shacharit">שחרית: 9:00</div>
        <div id="mincha">מנחה: ...</div>
        <div id="arvit">ערבית וצאת שבת: ...</div>
    </div>
</div>

<script>
// --- פרשת השבוע ---
fetch("https://www.chabad.org/calendar/api/v2/?mode=day&cfg=json&date=today")
    .then(r => r.json())
    .then(data => {
        const parsha = data.items.find(x => x.category === "parsha");
        if (parsha) {
            document.getElementById("parasha").innerText =
                "פרשת השבוע " + parsha.hebrew;
        }
    });

// --- זמני תפילה לפי חב״ד ---
// locationid = נתניה (אפשר לשנות)
fetch("https://www.chabad.org/calendar/api/v2/?mode=day&cfg=json&date=today&locationid=293")
    .then(r => r.json())
    .then(data => {
        const zmanim = data.zmanim;

        document.getElementById("mincha").innerText =
            "מנחה: " + zmanim.minchaGedola;

        document.getElementById("arvit").innerText =
            "ערבית וצאת שבת: " + zmanim.tzaitShabbat;
    });
</script>

</body>
</html>
